name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            web/yarn.lock
            e2e/yarn.lock

      - name: Restore .NET
        run: dotnet restore EventHub.slnx

      - name: Verify .NET formatting
        run: dotnet format whitespace EventHub.slnx --verify-no-changes --no-restore

      - name: Build .NET
        run: dotnet build EventHub.slnx --no-restore -c Release

      - name: Install frontend dependencies
        run: yarn --cwd web install --frozen-lockfile

      - name: Verify OpenAPI contract matches API
        run: yarn --cwd web api:verify

      - name: Test .NET (unit + integration tests)
        run: dotnet test EventHub.slnx --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Lint frontend
        run: yarn --cwd web lint

      - name: Check frontend formatting
        run: yarn --cwd web format:check

      - name: Build frontend
        run: yarn --cwd web build

      - name: Install e2e dependencies
        run: yarn --cwd e2e install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn --cwd e2e playwright install --with-deps chromium

      - name: Run e2e tests
        run: yarn --cwd e2e test --reporter=line

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          if-no-files-found: ignore

  agent-evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run deterministic agent evals (harness + graph)
        shell: pwsh
        run: ./harness/evals/Invoke-HarnessEvals.ps1

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evals
          path: harness/evals/results/latest.json
